# Mac (Docker Desktop): no GPU passthrough exists, so no devices/deploy block.
# host networking is unavailable on Docker Desktop for Mac, so tether cannot
# rely on network_mode: host — ports must be mapped explicitly.
#
# No DISPLAY / X11 here on purpose. XQuartz could never render this stack (GL
# has no working driver inside the emulated x86 image — rqt died on swrast),
# so the GUI path is gone entirely: video is served over HTTP on :8080 and
# watched in a browser, and Gazebo always runs headless. Nothing to configure,
# and it behaves the same on any host.
services:
  robomaster-sim:
    platform: linux/amd64
    environment:
      # Still needed headless: Gazebo renders camera sensors offscreen.
      - LIBGL_ALWAYS_SOFTWARE=1
      - IGN_GAZEBO_RESOURCE_PATH=/root/ros2_ws/install/robomaster_description/share
    # RoboMaster EP plaintext SDK ports, confirmed against DJI's official
    # docs (robomaster-dev.readthedocs.io) and the dji-sdk/RoboMaster-SDK
    # source. All TCP, not UDP — the earlier placeholder comment here was
    # wrong on that point.
    #   40923 - control command port (send text commands, get "ok;"/data back)
    #   40924 - telemetry push port (chassis/gimbal push, once enabled)
    #   40925 - event port (armor hit, voice recognition, etc.)
    #   40926 - IP broadcast port (only used in Wi-Fi networking mode, to
    #            discover the robot's DHCP-assigned IP; not needed in
    #            direct-connection mode, where the IP is always set in .env)
    #   40921 - video stream port (raw H.264, only after sending "stream on;")
    #   40922 - audio stream port (Opus, only after sending "audio on;")
    # Direct-connection mode only needs 40923 to drive the chassis. The
    # rest are uncommented here for when video/telemetry get wired in —
    # trim to just 40923 if you want a smaller attack surface until then.
    ports:
      # web_video_server — the only way video reaches you on this host.
      - "8080:8080/tcp"
      - "40923:40923/tcp"
      - "40924:40924/tcp"
      - "40925:40925/tcp"
      - "40926:40926/tcp"
      - "40921:40921/tcp"
      - "40922:40922/tcp"
